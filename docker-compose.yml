version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: maritime_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: maritime
      POSTGRES_PASSWORD: maritime_pass
      POSTGRES_DB: maritime_ops
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U maritime -d maritime_ops']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: maritime_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://maritime:maritime_pass@postgres:5432/maritime_ops
      JWT_SECRET: your-super-secret-jwt-key-change-in-prod-2024
      NODE_ENV: production
      PORT: 4000
      FRONTEND_URL: http://localhost:3000
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && npx ts-node prisma/seed.ts && node dist/index.js"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: maritime_frontend
    restart: unless-stopped
    environment:
      REACT_APP_API_URL: http://localhost:4000/api
    ports:
      - '3000:80'
    depends_on:
      - backend

volumes:
  postgres_data:
